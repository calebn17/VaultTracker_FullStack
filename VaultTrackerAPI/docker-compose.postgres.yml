services:
  postgres:
    image: postgres:16-alpine
    container_name: vaulttracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vaulttracker
      POSTGRES_USER: vaulttracker
      POSTGRES_PASSWORD: vaulttracker_dev_password
    ports:
      - "5432:5432"
    volumes:
      - vaulttracker_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaulttracker -d vaulttracker"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  vaulttracker_postgres_data:
