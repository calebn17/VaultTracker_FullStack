[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "W", "C90", "N"]

[tool.ruff.lint.per-file-ignores]
# Bootstrap script mutates sys.path before app imports.
"scripts/seed_demo_portfolio.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
