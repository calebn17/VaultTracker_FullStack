# Analyzer rules run only with `swiftlint analyze` + a compiler log — not `swiftlint lint`.
# See https://realm.github.io/SwiftLint/unused_import.html
analyzer_rules:
  - unused_import

opt_in_rules:
  - empty_count
  - closure_spacing
  - implicitly_unwrapped_optional

disabled_rules:
  - trailing_whitespace  # SwiftLint autocorrect handles this

force_cast: error
force_try: error
implicitly_unwrapped_optional:
  severity: error

line_length:
  warning: 120
  error: 200

file_length:
  warning: 400
  error: 600
